<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SisExeFin</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2b3d51; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        .login-box h2 {
            margin-top: 0;
            color: #2b3d51;
            font-size: 24px;
        }
        .login-box p {
            color: #777;
            margin-bottom: 25px;
        }
        .form-input {
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
        }
        .btn-login {
            width: 100%; 
            padding: 12px; 
            background-color: #2a81b8; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #1e5f8a;
        }
        .btn-login:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>SisExeFin</h2>
        <p>Insira as suas credenciais para aceder</p>
        
        <div id="erro" style="color: #e74c3c; font-size: 14px; display: none; margin-bottom: 15px; font-weight: bold;"></div>
        
        <form id="form-login" onsubmit="fazerLogin(event)">
            <input type="email" id="email" class="form-input" placeholder="E-mail" required autocomplete="email">
            <input type="password" id="senha" class="form-input" placeholder="Palavra-passe" required autocomplete="current-password">
            <button type="submit" id="btn-entrar" class="btn-login">Entrar no Sistema</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <script>
        // Se o utilizador já tiver sessão iniciada, salta direto para o sistema
        auth.onAuthStateChanged(user => {
            if(user) {
                window.location.href = "sistema.html";
            }
        });

        // Lógica de Submissão do Formulário
        function fazerLogin(event) {
            // Impede a página de recarregar (comportamento padrão do form)
            event.preventDefault(); 

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const erroMsg = document.getElementById('erro');
            const btnEntrar = document.getElementById('btn-entrar');
            
            erroMsg.style.display = "none";
            
            // UX: Desativar botão enquanto processa (evita cliques duplos)
            btnEntrar.disabled = true;
            btnEntrar.innerText = "A validar...";

            // Pedido de autenticação ao Firebase
            auth.signInWithEmailAndPassword(email, senha)
                .then(() => {
                    // Porta aberta! Vai para o painel principal
                    window.location.href = "sistema.html";
                })
                .catch(error => { 
                    // Mensagem de erro genérica para evitar User Enumeration
                    erroMsg.innerText = "Acesso Negado: E-mail ou palavra-passe incorretos.";
                    erroMsg.style.display = "block";
                    
                    // Reativar o botão
                    btnEntrar.disabled = false;
                    btnEntrar.innerText = "Entrar no Sistema";
                    
                    // Apenas para efeitos de log interno do admin
                    console.error("Erro de Autenticação:", error.code);
                });
        }
    </script>
</body>
</html>
