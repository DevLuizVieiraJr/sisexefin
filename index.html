<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SisExeFin</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2b3d51; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        .login-box h2 {
            margin-top: 0;
            color: #2b3d51;
            font-size: 24px;
        }
        .login-box p {
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        input:focus {
            border-color: #337ab7;
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #337ab7; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
            font-size: 15px;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #286090; 
        }
        #erro {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🌐 SisExeFin</h2>
        <p>Acesso Restrito - Autenticação</p>
        
        <input type="email" id="email" placeholder="O teu E-mail" required>
        <input type="password" id="senha" placeholder="A tua Senha" required>
        
        <button onclick="fazerLogin()">Entrar no Sistema</button>
        
        <p id="erro"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // Ligar ao teu Banco de Dados
        const firebaseConfig = {
            apiKey: "AIzaSyDXHpJFnVUR7YCh-3rXvx4yX6zo3a-mR7A",
            authDomain: "sisexefin.firebaseapp.com",
            projectId: "sisexefin",
            appId: "1:476004653478:web:45aecf0d547f57eee8d767"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Se o utilizador já tiver feito login antes, salta direto para o sistema!
        auth.onAuthStateChanged(user => {
            if(user) {
                window.location.href = "sistema.html";
            }
        });

        // Função do Botão Entrar
        function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const erroMsg = document.getElementById('erro');
            
            erroMsg.style.display = "none"; // Esconde o erro antes de tentar
            
            if(!email || !senha) {
                erroMsg.innerText = "Por favor, preenche o e-mail e a senha.";
                erroMsg.style.display = "block";
                return;
            }

            // Pede ao Firebase para abrir a porta
            auth.signInWithEmailAndPassword(email, senha)
                .then(() => {
                    // Porta aberta! Vai para o painel principal
                    window.location.href = "sistema.html";
                })
                .catch(error => { 
                    erroMsg.innerText = "Acesso Negado: E-mail ou senha incorretos.";
                    erroMsg.style.display = "block";
                    console.error(error);
                });
        }
    </script>
</body>
</html>
