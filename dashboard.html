<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisExeFin - Sistema de Execução Financeira</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loading-overlay.hide { display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #337ab7; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .menu-link-externo { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 8px; }
        .menu-link-externo:hover { color: #5dade2; }
        .menu-btn.emdesevolvimento { opacity: 0.75; cursor: pointer; }
        .topbar-config { cursor: pointer; padding: 4px 8px; margin-right: 8px; border-radius: 4px; }
        .topbar-config:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body style="display: none;" id="corpo-dashboard">

    <div id="loadingApp" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #337ab7; font-weight: bold;">A Sincronizar com a Nuvem...</p>
    </div>

    <header class="topbar">
        <div class="topbar-logo"><span class="icon-logo">🌐</span> Sistema de Execução Financeira (SisExeFin)</div>
        <div class="topbar-user">
            <span id="nomeUsuarioLogado" class="topbar-item">👤 A carregar...</span>
            <div id="containerSeletorPerfil" class="topbar-item" style="display: none;">
                <label style="font-size: 12px;">Perfil:</label>
                <select id="seletorPerfilAtivo" onchange="trocarPerfil(this.value)" style="padding: 4px 8px; font-size: 12px; border-radius: 3px; background: rgba(255,255,255,0.9); color: #333;"></select>
            </div>
            <span class="topbar-config" onclick="alert('Módulo de Configurações em desenvolvimento.');" title="Configurações">⚙️</span>
            <span class="topbar-sair" onclick="fazerLogout()">🚪 Sair</span>
        </div>
    </header>

    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <button type="button" class="sidebar-toggle" onclick="toggleSidebar()" title="Ocultar / Mostrar menu"><span class="menu-btn-icon">◀</span><span class="sidebar-toggle-text"> Ocultar menu</span></button>
            <ul><!-- Menu injetado por script-menu-lateral.js (fonte única) --></ul>
        </nav>

        <main class="content">
            <div class="card">
                <h2>Dashboard</h2>
                <p style="color: #777; margin-top: 15px;">Página principal do Sistema. Utilize o menu lateral para aceder aos módulos.</p>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script-menu-lateral.js"></script>
    <script src="script.js"></script>
    <script src="script-dashboard.js"></script>
    <script src="script-menu-toggle.js"></script>
</body>
</html>
