<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SisExeFin — Migrar Pré-Liquidação → Liquidação</title>
    <script src="script-tema.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        #logMigracao { font-family: monospace; font-size: 12px; background: #f8f8f8; border: 1px solid #ddd; padding: 12px; max-height: 400px; overflow: auto; white-space: pre-wrap; }
        .warn { color: #a94442; }
        .ok { color: #3c763d; }
    </style>
</head>
<body style="display:none; flex-direction:column;" id="corpo-migrar-pl">
    <main class="content" style="max-width:900px; margin:24px auto;">
        <div class="card">
            <h2>Migração: preLiquidacoes → liquidacoes</h2>
            <p style="font-size:13px; color:#555;">
                Converte lotes de Pré-Liquidação para Liquidação e Pagamento, atualiza vínculos em <code>titulos</code>
                e ajusta o contador <code>liquidacao_{ano}</code>. Requer <strong>acesso_admin</strong>.
                Em modo normal, documentos PL com <code>migradoLiquidacao: true</code> são ignorados.
            </p>
            <div style="display:flex; align-items:center; gap:8px; margin:12px 0;">
                <input type="checkbox" id="chkForcar">
                <label for="chkForcar" style="font-size:13px; color:#a94442;">
                    Forçar re-migração de <strong>todas</strong> as PLs (ignora <code>migradoLiquidacao</code> e sobrescreve LPs existentes)
                </label>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin:16px 0;">
                <button type="button" id="btnSimular" class="btn-default">Simular (sem gravar)</button>
                <button type="button" id="btnMigrar" class="btn-primary">Executar migração</button>
            </div>
            <div id="logMigracao"></div>
        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>
    (function () {
        var logEl = document.getElementById('logMigracao');
        function log(msg, cls) {
            var line = document.createElement('div');
            if (cls) line.className = cls;
            line.textContent = msg;
            logEl.appendChild(line);
        }

        function usuarioTemAcessoAdmin() {
            return typeof permissoesEmCache !== 'undefined'
                && Array.isArray(permissoesEmCache)
                && permissoesEmCache.includes('acesso_admin');
        }

        function mapEstadoPL(estado) {
            var e = String(estado || '').trim();
            var m = {
                'Rascunho':                  'rascunho',
                'Fechado':                   'fechado',
                'Cancelado':                 'cancelado',
                'Aguardando Financeiro':      'aguardandoFinanceiroSemLF',
                'Para Pagamento parcial':     'paraPagamentoParcial',
                'Para Pagamento':            'paraPagamento',
            };
            return m[e] || String(e).toLowerCase() || 'rascunho';
        }

        function estadoCancelado(estadoLP) {
            return estadoLP === 'cancelado';
        }

        function codigoPLparaLP(codigo) {
            return String(codigo || '').replace(/^PL-/i, 'LP-');
        }

        function buildOrcamento(tituloIds, titulosMap) {
            var resultado = [];
            (tituloIds || []).forEach(function (tid) {
                var t    = titulosMap[tid] || {};
                var emps = (t.empenhosVinculados || []);
                if (!emps.length) {
                    resultado.push({
                        tcId: tid, ne: '—', nd: '—', sub: '—', fr: '—',
                        valor: Number(t.valorNotaFiscal || t.valor || 0),
                        cc: '—', ug: '—', vinc: '', lf: '', pf: '',
                    });
                } else {
                    emps.forEach(function (v) {
                        resultado.push({
                            tcId:  tid,
                            ne:    v.numEmpenho || v.numNE || '—',
                            nd:    v.nd          || '—',
                            sub:   v.subelemento || '—',
                            fr:    v.fr          || '—',
                            valor: Number(v.valorVinculado || 0),
                            cc:    v.centroCustosId || '—',
                            ug:    v.ugId           || '—',
                            vinc: '', lf: v.lf || '', pf: v.pf || '',
                        });
                    });
                }
            });
            return resultado;
        }

        // Retorna deduções de um TC por tipo a partir do mapa já carregado
        function getDeducoesDoMap(titulosMap, tcId, tipo) {
            var t = titulosMap[tcId] || {};
            return (t.deducoesAplicadas || t.tributacoes || []).filter(function (d) { return d.tipo === tipo; });
        }

        function somarDeducoes(lista, campo1, campo2) {
            return lista.reduce(function (s, d) {
                return s + (Number(d[campo1] || d[campo2] || 0));
            }, 0);
        }

        function moeda(v) {
            return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        // Gera log de diagnóstico de NE e deduções para cada TC do lote
        function logDiagnosticos(tituloIds, titulosMap, codigoLp) {
            var semNE = [];
            var totalNEs = 0;
            var totalINSS = 0, totalISS = 0, totalDARF = 0;
            var tcsSemDeducao = 0;

            (tituloIds || []).forEach(function (tid) {
                var t = titulosMap[tid];
                if (!t) { semNE.push(tid); return; }

                var emps = (t.empenhosVinculados || []);
                if (!emps.length) {
                    semNE.push(tid);
                } else {
                    totalNEs += emps.length;
                }

                var inss = getDeducoesDoMap(titulosMap, tid, 'DDF021');
                var iss  = getDeducoesDoMap(titulosMap, tid, 'DDR001');
                var darf = getDeducoesDoMap(titulosMap, tid, 'DDF025');

                totalINSS += somarDeducoes(inss, 'valor', 'valor');
                totalISS  += somarDeducoes(iss,  'valor', 'valor');
                totalDARF += somarDeducoes(darf, 'total', 'valor');

                if (!inss.length && !iss.length && !darf.length) tcsSemDeducao++;
            });

            log('  NEs vinculados: ' + totalNEs + ' | TCs sem empenhosVinculados: ' + semNE.length
                + (semNE.length ? ' ⚠ (NE ficará "—")' : ''));

            if (semNE.length) {
                log('    TCs sem NE: ' + semNE.join(', '), 'warn');
            }

            var totalDed = totalINSS + totalISS + totalDARF;
            if (totalDed > 0) {
                log('  Deduções → INSS: ' + moeda(totalINSS)
                    + ' | ISS: ' + moeda(totalISS)
                    + ' | DARF: ' + moeda(totalDARF)
                    + ' | Total: ' + moeda(totalDed));
            } else {
                log('  Deduções: nenhuma' + (tcsSemDeducao === tituloIds.length ? '' : ' (apenas em alguns TCs)'));
            }
            if (tcsSemDeducao > 0) {
                log('  TCs sem nenhuma dedução: ' + tcsSemDeducao + ' de ' + tituloIds.length);
            }
        }

        async function carregarTitulos(ids) {
            var map = {};
            for (var i = 0; i < ids.length; i++) {
                var snap = await db.collection('titulos').doc(ids[i]).get();
                if (snap.exists) map[ids[i]] = snap.data();
            }
            return map;
        }

        async function executarMigracao(simular) {
            logEl.innerHTML = '';
            if (!usuarioTemAcessoAdmin()) {
                log('Acesso negado: requer acesso_admin.', 'warn');
                return;
            }
            mostrarLoading && mostrarLoading();

            try {
                var chkEl = document.getElementById('chkForcar');
                var forcar = !!(chkEl && chkEl.checked);

                var snapPl = await db.collection('preLiquidacoes').get();
                var snapLp = await db.collection('liquidacoes').get();

                var jaMigradas = snapPl.docs.filter(function (d) { return !!d.data().migradoLiquidacao; });
                var naoMigradas = snapPl.docs.filter(function (d) { return !d.data().migradoLiquidacao; });
                var pendentes = forcar ? snapPl.docs.slice() : naoMigradas;

                var idsLP = {};
                snapLp.docs.forEach(function (d) { idsLP[d.id] = d.data() || {}; });

                log('=== INVENTÁRIO ===');
                log('Coleção preLiquidacoes: ' + snapPl.size + ' documento(s)');
                log('  - Já migradas (migradoLiquidacao=true): ' + jaMigradas.length);
                log('  - Sem flag de migração: ' + naoMigradas.length);
                log('Coleção liquidacoes: ' + snapLp.size + ' documento(s)');

                // Cruzamento: PLs marcadas como migradas mas sem LP correspondente
                var migradasSemDestino = jaMigradas.filter(function (d) {
                    var p = d.data() || {};
                    var destino = p.liquidacaoIdDestino || d.id;
                    return !idsLP[destino];
                });
                if (migradasSemDestino.length) {
                    log('AVISO: ' + migradasSemDestino.length + ' PL(s) marcadas como migradas mas SEM LP correspondente na coleção liquidacoes:', 'warn');
                    migradasSemDestino.slice(0, 20).forEach(function (d) {
                        var p = d.data() || {};
                        log('    - ' + (p.codigo || d.id) + ' → destino esperado: liquidacoes/' + (p.liquidacaoIdDestino || d.id), 'warn');
                    });
                    if (migradasSemDestino.length > 20) log('    - ... mais ' + (migradasSemDestino.length - 20) + ' caso(s).', 'warn');
                    if (!forcar) {
                        log('Sugestão: marque "Forçar re-migração" para re-migrar essas PLs sem precisar limpar o flag manualmente.', 'warn');
                    }
                }

                if (forcar) {
                    log('MODO FORÇAR ATIVO: ' + pendentes.length + ' PL(s) serão re-migradas (sobrescreve liquidacoes existentes).', 'warn');
                } else {
                    log('Serão migradas ' + pendentes.length + ' PL(s) pendente(s).');
                    if (pendentes.length) {
                        pendentes.slice(0, 20).forEach(function (d) {
                            var p = d.data() || {};
                            log('    - ' + (p.codigo || d.id) + ' (estado: ' + (p.estado || '—') + ')');
                        });
                        if (pendentes.length > 20) log('    - ... mais ' + (pendentes.length - 20) + ' pendente(s).');
                    }
                }

                log('=== ' + (simular ? 'SIMULAÇÃO' : 'MIGRAÇÃO') + ' ===');

                var maxSeqPorAno = {};
                var migrados = 0;

                for (var j = 0; j < pendentes.length; j++) {
                    var doc = pendentes[j];
                    var pl = doc.data();
                    var plId = doc.id;
                    var estadoLP = mapEstadoPL(pl.estado);
                    var cancelada = estadoCancelado(estadoLP);

                    // IDs reais da PL (usados para log e tcsParticiparamIds)
                    var todosIds = (pl.tituloIds || []).slice();
                    if (!todosIds.length) todosIds = (pl.titulosParticiparamIds || []).slice();

                    // IDs que receberão liquidacaoId: nenhum para PLs canceladas
                    var idsParaVincular = cancelada ? [] : todosIds;

                    var codigoLp = codigoPLparaLP(pl.codigo);
                    var m = codigoLp.match(/LP-(\d{5})\/(\d{4})/);
                    if (m) {
                        var ano = parseInt(m[2], 10);
                        var seq = parseInt(m[1], 10);
                        maxSeqPorAno[ano] = Math.max(maxSeqPorAno[ano] || 0, seq);
                    }

                    var titulosMap = await carregarTitulos(todosIds);

                    // Para LP cancelada: tcsIds=[], tcsParticiparamIds=todosIds (sem liquidacaoId nos TCs)
                    // Para LP ativa:     tcsIds=todosIds, tcsParticiparamIds=pl.titulosParticiparamIds
                    var payload = {
                        codigo: codigoLp,
                        estado: estadoLP,
                        fornecedor: {
                            cnpj: pl.fornecedorCnpj || '',
                            nome: pl.fornecedorNome || '',
                        },
                        tcsIds:              cancelada ? [] : todosIds,
                        tcsParticiparamIds:  cancelada ? todosIds : (pl.titulosParticiparamIds || []),
                        orcamento:           cancelada ? [] : (pl.orcamento || buildOrcamento(todosIds, titulosMap)),
                        np:                  pl.np || '',
                        dataLiquidacao:      pl.dataLiquidacao || '',
                        historico:           pl.historico || [],
                        auditoriaPdf:        pl.auditoriaPdf || null,
                        ativo:               pl.ativo !== false,
                        migradoDePreLiquidacao: true,
                        preLiquidacaoIdOrigem:  plId,
                        criadoEm:  pl.criado_em  || firebase.firestore.FieldValue.serverTimestamp(),
                        criadoPor: pl.criado_por || '',
                        editadoEm: pl.editado_em || firebase.firestore.FieldValue.serverTimestamp(),
                        editadoPor: pl.editado_por || '',
                    };

                    log((simular ? '[sim] ' : '') + codigoLp
                        + ' estado=' + estadoLP
                        + (cancelada ? ' [CANCELADA — TCs não receberão liquidacaoId]' : '')
                        + ' (' + todosIds.length + ' TCs) → liquidacoes/' + plId);

                    // Diagnóstico detalhado de NE e deduções
                    if (todosIds.length) {
                        logDiagnosticos(todosIds, titulosMap, codigoLp);
                    }

                    if (!simular) {
                        var batch = db.batch();
                        batch.set(db.collection('liquidacoes').doc(plId), payload, { merge: true });

                        // PLs canceladas: remove preLiquidacaoId dos TCs, mas NÃO vincula liquidacaoId
                        idsParaVincular.forEach(function (tid) {
                            batch.update(db.collection('titulos').doc(tid), {
                                liquidacaoId:     plId,
                                liquidacaoCodigo: codigoLp,
                                preLiquidacaoId:       firebase.firestore.FieldValue.delete(),
                                preLiquidacaoCodigo:   firebase.firestore.FieldValue.delete(),
                                editado_em: firebase.firestore.FieldValue.serverTimestamp(),
                            });
                        });

                        if (cancelada) {
                            // Remove apenas o vínculo PL dos TCs (libera para novos lotes)
                            todosIds.forEach(function (tid) {
                                if (idsParaVincular.indexOf(tid) === -1) {
                                    batch.update(db.collection('titulos').doc(tid), {
                                        preLiquidacaoId:     firebase.firestore.FieldValue.delete(),
                                        preLiquidacaoCodigo: firebase.firestore.FieldValue.delete(),
                                        editado_em: firebase.firestore.FieldValue.serverTimestamp(),
                                    });
                                }
                            });
                        }

                        batch.update(db.collection('preLiquidacoes').doc(plId), {
                            migradoLiquidacao:  true,
                            liquidacaoIdDestino: plId,
                            editado_em: firebase.firestore.FieldValue.serverTimestamp(),
                        });
                        await batch.commit();
                        log('  ✓ gravado', 'ok');
                    }
                    migrados++;
                }

                if (!simular) {
                    for (var anoKey in maxSeqPorAno) {
                        if (!maxSeqPorAno.hasOwnProperty(anoKey)) continue;
                        var counterRef = db.collection('contadores').doc('liquidacao_' + anoKey);
                        var cSnap = await counterRef.get();
                        var atual = cSnap.exists ? (cSnap.data().seq || 0) : 0;
                        var novo = Math.max(atual, maxSeqPorAno[anoKey]);
                        if (novo > atual) {
                            await counterRef.set({ seq: novo, editado_em: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                            log('Contador liquidacao_' + anoKey + ' → seq ' + novo, 'ok');
                        }
                    }
                }

                log('Concluído: ' + migrados + ' lote(s) ' + (simular ? 'simulados' : 'migrados') + '.', 'ok');
            } catch (err) {
                log('Erro: ' + (err.message || err), 'warn');
                console.error(err);
            } finally {
                esconderLoading && esconderLoading();
            }
        }

        auth.onAuthStateChanged(async function (user) {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            if (typeof carregarPermissoes === 'function') await carregarPermissoes();
            if (!usuarioTemAcessoAdmin()) {
                document.querySelector('main').innerHTML =
                    '<div class="card"><p style="color:#a94442;font-weight:600;">Acesso negado: requer acesso_admin.</p></div>';
                document.body.style.display = 'flex';
                return;
            }
            document.body.style.display = 'flex';
            document.getElementById('btnSimular').addEventListener('click', function () { executarMigracao(true); });
            document.getElementById('btnMigrar').addEventListener('click', function () {
                var forcar = !!document.getElementById('chkForcar').checked;
                var msg = forcar
                    ? 'MODO FORÇAR está ativo: TODAS as PLs serão re-migradas e LPs existentes serão SOBRESCRITAS no Firestore. Continuar?'
                    : 'Executar migração real no Firestore?';
                if (!confirm(msg)) return;
                executarMigracao(false);
            });
        });
    })();
    </script>
</body>
</html>
