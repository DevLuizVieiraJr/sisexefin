<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SisExeFin - Administração de Acessos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: none;" id="corpo-admin">
    <header class="topbar" style="background-color: #2c3e50;">
        <div class="topbar-logo">🛡️ Painel de Segurança - RBAC</div>
        <div class="topbar-user"><button onclick="location.href='sistema.html'" class="btn-outline" style="color:white; border-color:white;">⬅ Voltar ao Sistema</button></div>
    </header>

    <div class="content">
        <div class="card">
            <h2>Gestão de Cargos e Permissões</h2>
            <div style="display: flex; gap: 30px; margin-top: 20px;">
                <div style="flex: 1; border-right: 1px solid #eee; padding-right: 20px;">
                    <h3>1. Definir Perfil</h3>
                    <form id="formPerfilAdmin">
                        <div class="form-group"><label>Nome do Perfil:</label><input type="text" id="adminNomePerfil" placeholder="ex: operador_leitura" required></div>
                        <fieldset class="gov-fieldset">
                            <legend>Permissões</legend>
                            <label><input type="checkbox" class="cb-perm" value="acesso_admin"> Acesso Admin</label><br>
                            <label><input type="checkbox" class="cb-perm" value="inserir_dados"> Inserir Dados</label><br>
                            <label><input type="checkbox" class="cb-perm" value="editar_dados"> Editar Dados</label><br>
                            <label><input type="checkbox" class="cb-perm" value="excluir_dados"> Excluir Dados</label>
                        </fieldset>
                        <button type="submit" class="btn-primary" style="margin-top:10px;">💾 Salvar Perfil</button>
                    </form>
                </div>
                <div style="flex: 1;">
                    <h3>2. Atribuir Perfil a Usuário</h3>
                    <form id="formUsuarioAdmin">
                        <div class="form-group"><label>UID do Usuário:</label><input type="text" id="adminUsuarioUid" required></div>
                        <div class="form-group"><label>Email:</label><input type="email" id="adminUsuarioEmail" required></div>
                        <div class="form-group"><label>Perfil (Role):</label><input type="text" id="adminUsuarioPerfil" required></div>
                        <button type="submit" class="btn-outline">Atribuir Cargo</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
